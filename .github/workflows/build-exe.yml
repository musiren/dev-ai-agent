name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/chatbot/**'
      - '.github/workflows/build-exe.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build release
        run: |
          cd src/chatbot
          cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-exe
          path: src/chatbot/target/release/chatbot.exe
